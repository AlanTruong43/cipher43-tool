<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 220px;
    padding: 12px 14px;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    margin: 0;
  }
  .header {
    font-size: 13px;
    font-weight: 700;
    color: #00d4aa;
    margin-bottom: 10px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .value {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }
  .value.loading { color: #ff9800; }
  .value.error   { color: #f44336; font-size: 11px; }
  .btn-copy {
    background: #1a1a2e;
    border: 1px solid #252540;
    color: #00d4aa;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-copy:hover { background: #202038; }
</style>
</head>
<body>
  <div class="header">⚡ Cipher 43</div>

  <div class="row">
    <span>Debug Port</span>
    <button class="btn-copy" id="btn-copy">copy</button>
  </div>
  <div class="value loading" id="port-value">Đang tìm...</div>

<script>
const send = (msg) => new Promise(r => chrome.runtime.sendMessage(msg, r));

(async () => {
  const el = document.getElementById("port-value");
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });

  if (!tab) {
    el.className = "value error";
    el.textContent = "Không có tab active";
    return;
  }

  const res = await send({ action: "find_port_for_url", url: tab.url });

  if (res?.success) {
    el.className = "value";
    el.textContent = res.port;
    document.getElementById("btn-copy").onclick = () => {
      navigator.clipboard.writeText(String(res.port));
      document.getElementById("btn-copy").textContent = "✓";
      setTimeout(() => document.getElementById("btn-copy").textContent = "copy", 1500);
    };
  } else {
    el.className = "value error";
    el.textContent = "Không tìm thấy port";
  }
})();
</script>
</body>
</html>
