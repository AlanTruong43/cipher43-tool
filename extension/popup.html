<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
  }

  .header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid #1e1e30;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 13px; font-weight: 700; color: #00d4aa; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; transition: background 0.3s;
  }
  .status-dot.online { background: #00d4aa; }

  .section { padding: 12px 14px; border-bottom: 1px solid #1a1a2e; }

  label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #252540;
    color: #fff;
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #00d4aa; }

  .tool-info {
    background: #111122;
    border: 1px solid #252540;
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 12px;
    min-height: 32px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool-info .name { color: #fff; font-weight: 600; }
  .tool-info .script { color: #666; font-size: 10px; }
  .tool-info.error { color: #f44336; }
  .tool-info.placeholder { color: #444; }

  select {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #252540;
    color: #fff;
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  select:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn {
    width: 100%;
    padding: 9px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: #00d4aa; color: #0f0f1a; }
  .btn-primary:hover:not(:disabled) { background: #00eec0; }
  .btn-run { background: #2563eb; color: #fff; }
  .btn-run:hover:not(:disabled) { background: #3b82f6; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .row-btns { display: flex; gap: 8px; }
  .row-btns .btn { flex: 1; }

  .result {
    padding: 10px 14px;
    font-size: 11px;
    line-height: 1.5;
    color: #888;
    min-height: 36px;
    white-space: pre-wrap;
  }
  .result.success { color: #00d4aa; }
  .result.error { color: #f44336; }
</style>
</head>
<body>

  <div class="header">
    <span class="header-title">⚡ Cipher 43 Tool</span>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- Token -->
  <div class="section">
    <label>Tool Token</label>
    <div style="display:flex;gap:6px">
      <input type="password" id="input-token" placeholder="c43_..." autocomplete="off" />
      <button class="btn btn-primary" id="btn-load" style="width:auto;padding:7px 12px;white-space:nowrap">Load</button>
    </div>
  </div>

  <!-- Tool info -->
  <div class="section">
    <label>Tool đang dùng</label>
    <div class="tool-info placeholder" id="tool-info">
      <span>Chưa load token</span>
    </div>
  </div>

  <!-- Profile -->
  <div class="section">
    <label>Profile</label>
    <select id="select-profile" disabled>
      <option value="">-- Chọn profile --</option>
    </select>
  </div>

  <!-- Excel path -->
  <div class="section">
    <label>Đường dẫn file Excel</label>
    <input type="text" id="input-excel" placeholder="C:\Users\...\data.xlsx" />
  </div>

  <!-- Buttons -->
  <div class="section" style="border-bottom:none">
    <div class="row-btns">
      <button class="btn btn-run" id="btn-run" disabled>▶ Chạy</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result"></div>

<script src="popup.js"></script>
</body>
</html>
